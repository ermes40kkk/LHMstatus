<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stapler-Transport Normalisierung</title>
  <script src="setting.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root { --bg:#f6f8fb; --card:#fff; --text:#1f2937; --muted:#64748b; --primary:#2563eb; --ok:#15803d; --warn:#b45309; --err:#b91c1c; --border:#d9e2ef; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); }
    header { padding:28px 32px; background:linear-gradient(135deg,#1d4ed8,#0f766e); color:white; }
    h1 { margin:0 0 8px; font-size:28px; }
    main { padding:24px 32px; max-width:1280px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); }
    .buttons { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
    button { border:0; border-radius:10px; background:var(--primary); color:white; padding:12px 16px; font-weight:700; cursor:pointer; }
    button.secondary { background:#475569; } button.success { background:var(--ok); } button:disabled { opacity:.55; cursor:not-allowed; }
    input[type=file] { display:none; }
    .hint { color:var(--muted); font-size:14px; margin-top:10px; }
    .status-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(230px,1fr)); gap:10px; }
    .metric { border:1px solid var(--border); border-radius:10px; padding:12px; background:#fbfdff; }
    .metric-label { color:var(--muted); font-size:13px; } .metric-value { font-size:24px; font-weight:800; margin-top:5px; }
    #log { height:330px; overflow:auto; background:#0f172a; color:#e2e8f0; padding:14px; border-radius:10px; font-family:Consolas, Monaco, monospace; font-size:13px; white-space:pre-wrap; }
    .ok { color:#86efac; } .warn { color:#fde68a; } .error { color:#fecaca; }
  </style>
</head>
<body>
<header>
  <h1>Stapler-Transport Normalisierung mit Palettennummer</h1>
  <div>Lokales Browser-Werkzeug für Excel-Import, exaktes Zeitstempel-Matching und CSV-ZIP-Export.</div>
</header>
<main>
  <section class="card">
    <div class="buttons">
      <button id="btnOhne" type="button">Dateien ohne Paletten-Nr. laden</button>
      <button id="btnMit" type="button" class="secondary">Dateien mit Paletten-Nr. laden</button>
      <button id="btnAnalyse" type="button" class="success">Analyse starten</button>
      <button id="btnLog" type="button" class="secondary">Log-Dateien laden</button>
      <button id="btnLogKontrolle" type="button" class="success">Log-Kontrolle starten</button>
      <input id="inputOhne" type="file" accept=".xlsx,.xls,.xlsm,.csv" multiple>
      <input id="inputMit" type="file" accept=".xlsx,.xls,.xlsm,.csv" multiple>
      <input id="inputLog" type="file" accept=".xlsx,.xls,.xlsm,.csv,.log,.txt" multiple>
    </div>
    <div class="hint">Hinweis: Die Bibliotheken SheetJS und JSZip werden per CDN geladen. Danach läuft die Verarbeitung vollständig lokal im Browser.</div>
  </section>
  <section class="card"><h2>Status</h2><div id="status" class="status-grid"></div></section>
  <section class="card"><h2>Log</h2><div id="log"></div></section>
</main>
<script>
'use strict';

// Zentrale Konstanten für spätere Erweiterungen um KOMMISSIONIERER und SG.
const SYSTEM_TYPES = {
  STAPLER: 'STAPLER',
  LOG: 'LOG',
  KOMMISSIONIERER: 'KOMMISSIONIERER',
  SG: 'SG'
};

const DEFAULT_SETTINGS = {
  alreadyAnalysedUntil: '',
  outputPrefix: 'stapler_normalisiert',
  debugPrefix: 'DEBUG_stapler_match_probleme',
  kalenderwocheModus: 'ISO',
  zeitzone: 'Europe/Berlin',
  includeOriginalJsonInDebug: false,
  staplerOhnePallet: {
    fileNameStartsWith: ['ROHDATEN', 'stapler_prämie'],
    sheets: ['Staplerfahrer', 'SL', 'Tabelle1']
  },
  staplerMitPallet: {
    fileNameStartsWith: ['ROHDATEN', 'stapler_prämie', 'Stapler', 'Transport'],
    sheets: ['Staplerfahrer', 'SL', 'Tabelle1']
  }
};

const SETTINGS = mergeDeep(DEFAULT_SETTINGS, window.APP_SETTINGS || {});
const OUTPUT_COLUMNS = [
  'START_KOORDINATE',
  'ZIEL_KOORDINATE',
  'SL_BEREICH',
  'SL_TERMINAL',
  'SL_BENUTZER',
  'BEGINN_DATUM',
  'END_DATUM',
  'ERSTER_TRANSPORT',
  'LETZTER_TRANSPORT',
  'ARBEITSSTUNDEN',
  'LHM_NR',
  'ARTIKEL_NR',
  'AUFTRAG',
  'NEUE_MENGE',
  'ALTE_MENGE',
  'PRODUKT_MENGE',
  'BEMERKUNG',
  'BEWEG_TYP',
  'ANGELEGTDURCH',
  'MHD_NEU',
  'ZIEL_LHM_NR',
  'Source_File',
  'Source_Row',
  'Transport_ID',
  'System_Typ',
  'Match_Methode',
  'Match_Qualität',
  'Debug_Hinweis',
  'Kandidaten_Anzahl',
  'Matched_Source_File',
  'Matched_Source_Row',
  'Log_Match_Methode',
  'Log_Match_Qualität',
  'Log_Debug_Hinweis',
  'Log_Source_File',
  'Log_Source_Row'
];
const DEBUG_COLUMNS = ['Source_File','Source_Row','BEGINN_DATUM','START_KOORDINATE','ZIEL_KOORDINATE','SL_BEREICH','SL_TERMINAL','SL_BENUTZER','Match_Methode','Match_Qualität','Debug_Hinweis','Kandidaten_Anzahl'];
const REQUIRED_LOG = ['ARTIKEL_NR','AUFTRAG','NEUE_MENGE','BEMERKUNG','BEWEG_TYP','START_KOORDINATE','ZIEL_KOORDINATE','ANLAGE_DATUM','ANGELEGTDURCH','LHM_NR','MHD_NEU','ALTE_MENGE','PRODUKT_MENGE','ZIEL_LHM_NR'];
const REQUIRED_WITHOUT = ['BEGINN_DATUM','START_KOORDINATE','ZIEL_KOORDINATE','SL_TERMINAL','SL_BENUTZER'];
const REQUIRED_WITH = ['BEGINN_DATUM','START_KOORDINATE','LHM_NR','ARTIKEL_NR'];
const state = {
  filesWithout: [],
  filesWith: [],
  filesLog: [],
  rowsWithout: [],
  rowsWith: [],
  rowsLog: [],
  logIndex: new Map(),
  results: [],
  stats: resetStats()
};

function resetStats() {
  return {
    filesWithout: 0,
    filesWith: 0,
    filesLog: 0,
    rowsWithout: 0,
    rowsWith: 0,
    rowsLog: 0,
    analysed: 0,
    sicher: 0,
    wahrscheinlich: 0,
    unsicher: 0,
    mehrdeutig: 0,
    nichtGefunden: 0,
    logSicher: 0,
    logMehrdeutig: 0,
    logNichtGefunden: 0
  };
}

function mergeDeep(base, extra) {
  const out = Array.isArray(base) ? base.slice() : Object.assign({}, base);

  for (const [key, value] of Object.entries(extra || {})) {
    if (value && typeof value === 'object' && !Array.isArray(value)) {
      out[key] = mergeDeep(out[key] || {}, value);
    } else {
      out[key] = value;
    }
  }

  return out;
}

function log(msg, cls = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');

  line.className = cls;
  line.textContent = `${new Date().toLocaleTimeString('de-DE')}  ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function updateStatus() {
  const items = [
    ['Anzahl Dateien ohne Palettennummer', state.stats.filesWithout],
    ['Anzahl Dateien mit Palettennummer', state.stats.filesWith],
    ['Anzahl Log-Dateien', state.stats.filesLog],
    ['Anzahl Zeilen ohne Palettennummer', state.stats.rowsWithout],
    ['Anzahl Zeilen mit Palettennummer', state.stats.rowsWith],
    ['Anzahl Log-Zeilen', state.stats.rowsLog],
    ['Anzahl analysierte Zeilen', state.stats.analysed],
    ['Anzahl sichere Matches', state.stats.sicher],
    ['Anzahl wahrscheinliche Matches', state.stats.wahrscheinlich],
    ['Anzahl unsichere Matches', state.stats.unsicher],
    ['Anzahl mehrdeutige Matches', state.stats.mehrdeutig],
    ['Anzahl nicht gefundene Matches', state.stats.nichtGefunden],
    ['Anzahl sichere Log-Matches', state.stats.logSicher],
    ['Anzahl mehrdeutige Log-Matches', state.stats.logMehrdeutig],
    ['Anzahl nicht gefundene Log-Matches', state.stats.logNichtGefunden]
  ];

  document.getElementById('status').innerHTML = items
    .map(([label, value]) => {
      return `<div class="metric"><div class="metric-label">${label}</div><div class="metric-value">${value}</div></div>`;
    })
    .join('');
}

function canonicalColumnName(name) {
  const raw = String(name || '').trim();
  const n = raw
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[._\-\s]+/g, '');
  const map = {
    startkoordinate: 'START_KOORDINATE',
    quellkoordinate: 'START_KOORDINATE',
    zielkoordinate: 'ZIEL_KOORDINATE',
    slbereich: 'SL_BEREICH',
    slterminal: 'SL_TERMINAL',
    slbenutzer: 'SL_BENUTZER',
    beginndatum: 'BEGINN_DATUM',
    beginndate: 'BEGINN_DATUM',
    enddatum: 'END_DATUM',
    aenderungsdatum: 'END_DATUM',
    anderungsdatum: 'END_DATUM',
    lhmnr: 'LHM_NR',
    lhmnummer: 'LHM_NR',
    artikelnr: 'ARTIKEL_NR',
    artikelnummer: 'ARTIKEL_NR',
    auftragsnr: 'AUFTRAG',
    neuemenge: 'NEUE_MENGE',
    bemerkung: 'BEMERKUNG',
    bewegtyp: 'BEWEG_TYP',
    quelllagerplatz: 'START_KOORDINATE',
    ziellagerplatz: 'ZIEL_KOORDINATE',
    anlagdatum: 'ANLAGE_DATUM',
    anlagedatum: 'ANLAGE_DATUM',
    angelegtdurch: 'ANGELEGTDURCH',
    mhdneu: 'MHD_NEU',
    altemenge: 'ALTE_MENGE',
    produktmenge: 'PRODUKT_MENGE',
    ziellhmnr: 'ZIEL_LHM_NR',
    erstertransport: 'ERSTER_TRANSPORT',
    letztertransport: 'LETZTER_TRANSPORT',
    arbeitsstunden: 'ARBEITSSTUNDEN'
  };

  return map[n] || raw.replace(/[\s\-.]+/g, '_').toUpperCase();
}

function normalizeValue(v) {
  return v == null ? '' : String(v).trim();
}

function normalizeCoord(v) {
  return normalizeValue(v).toUpperCase();
}

function normalizeDecimal(value) {
  if (value == null || value === '') {
    return '';
  }

  const raw = String(value).trim();

  if (!raw) {
    return '';
  }

  const normalized = raw.replace(',', '.');
  const n = Number(normalized);
  return Number.isFinite(n) ? n.toFixed(2) : raw;
}

function formatDecimalDE(value, decimals = 2) {
  if (value == null || value === '') return '';

  let s = String(value).trim();

  // Se arriva già con virgola, normalizza comunque
  s = s.replace(',', '.');

  const n = Number(s);

  if (!Number.isFinite(n)) {
    return String(value).trim();
  }

  return n.toFixed(decimals).replace('.', ',');
}

function formatExcelText(value) {
  const s = normalizeValue(value);

  if (!s) return '';

  return `="${s.replaceAll('"', '""')}"`;
}

function pad(n, len = 2) {
  return String(n).padStart(len, '0');
}

function excelSerialToDate(serial) {
  const utcDays = Math.floor(serial - 25569);
  const utcValue = utcDays * 86400;
  const d = new Date(utcValue * 1000);
  const frac = serial - Math.floor(serial);

  d.setSeconds(d.getSeconds() + Math.round(frac * 86400));
  return d;
}

function formatDate(d) {
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function normalizeDateTime(value) {
  if (value == null || value === '') {
    return '';
  }

  if (value instanceof Date && !isNaN(value)) {
    return formatDate(value);
  }

  if (typeof value === 'number') {
    return formatDate(excelSerialToDate(value));
  }

  const s = String(value).trim();
  let m = s.match(/^(\d{1,2})[.\-](\d{1,2})[.\-](\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);

  if (m) {
    return `${m[3]}-${pad(m[2])}-${pad(m[1])} ${pad(m[4] || 0)}:${pad(m[5] || 0)}:${pad(m[6] || 0)}`;
  }

  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[ T](\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);

  if (m) {
    return `${m[1]}-${pad(m[2])}-${pad(m[3])} ${pad(m[4] || 0)}:${pad(m[5] || 0)}:${pad(m[6] || 0)}`;
  }

  const d = new Date(s);
  return isNaN(d) ? '' : formatDate(d);
}

function dateOnlyKey(dt) {
  return dt ? dt.slice(0, 10).replaceAll('-', '') : '00000000';
}

function isAfterAlreadyAnalysed(dt) {
  if (!SETTINGS.alreadyAnalysedUntil) {
    return true;
  }

  return dt.slice(0, 10) > SETTINGS.alreadyAnalysedUntil;
}

function formatFileSize(bytes) {
  return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
}

function describeError(err) {
  const message = err && err.message ? err.message : String(err);

  if (message.includes('Maximum call stack size exceeded')) {
    return 'Maximale Aufrufstapelgröße überschritten. Wahrscheinlich wurden zu viele Zeilen auf einmal verarbeitet. Keine Spread-Operatoren auf großen Arrays verwenden.';
  }

  return message;
}

function pushRowsSafe(target, rows) {
  for (let i = 0; i < rows.length; i++) {
    target.push(rows[i]);
  }
}

async function readSelectedFiles(files, kind) {
  const cfg = kind === 'without' ? SETTINGS.staplerOhnePallet : SETTINGS.staplerMitPallet;
  const required = kind === 'without' ? REQUIRED_WITHOUT : REQUIRED_WITH;
  const target = kind === 'without' ? state.rowsWithout : state.rowsWith;

  target.length = 0;

  for (const file of files) {
    try {
      log(`Datei wird gelesen: ${file.name}`);
      log(`Dateigröße: ${formatFileSize(file.size)}`);

      if (file.size > 30 * 1024 * 1024) {
        log('Warnung: Diese Datei ist größer als 30 MB. Die Verarbeitung kann länger dauern.', 'warn');
      }

      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      const sheetName = selectSheet(wb, cfg.sheets);
      log(`Sheet wurde erkannt: ${sheetName}`, 'ok');

      const sheet = wb.Sheets[sheetName];
      const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: true });
      log(`Zeilen gelesen: ${rawRows.length}`);

      if (rawRows.length > 100000) {
        log('Warnung: Mehr als 100.000 Zeilen erkannt. Die Verarbeitung kann viel Speicher benötigen.', 'warn');
      }

      const normalized = normalizeRows(rawRows, file.name);
      const missing = missingColumns(normalized.columns, required);

      if (missing.length) {
        log(`Fehler: ${file.name} wird übersprungen. Pflichtspalten fehlen: ${missing.join(', ')}`, 'error');
        continue;
      }

      const validRows = [];

      for (const row of normalized.rows) {
        const beginnDatum = normalizeDateTime(row.BEGINN_DATUM);

        if (!beginnDatum) {
          continue;
        }

        row.BEGINN_DATUM = beginnDatum;
        row.END_DATUM = normalizeDateTime(row.END_DATUM) || normalizeValue(row.END_DATUM);
        row.START_KOORDINATE = normalizeCoord(row.START_KOORDINATE);
        row.ZIEL_KOORDINATE = normalizeCoord(row.ZIEL_KOORDINATE);
        row.SL_TERMINAL = normalizeValue(row.SL_TERMINAL);
        row.SL_BENUTZER = normalizeValue(row.SL_BENUTZER);
        validRows.push(row);
      }

      pushRowsSafe(target, validRows);

      log(`Gültige Zeilen: ${validRows.length}`, 'ok');
      log(`Übersprungene Zeilen: ${rawRows.length - validRows.length}`, 'ok');
    } catch (err) {
      log(`Fehler beim Lesen von ${file.name}: ${describeError(err)}`, 'error');
    }
  }

  state.stats.filesWithout = state.filesWithout.length;
  state.stats.filesWith = state.filesWith.length;
  state.stats.filesLog = state.filesLog.length;
  state.stats.rowsWithout = state.rowsWithout.length;
  state.stats.rowsWith = state.rowsWith.length;
  state.stats.rowsLog = state.rowsLog.length;
  updateStatus();
}

async function readLogFiles(files) {
  state.rowsLog.length = 0;
  state.logIndex = new Map();

  for (const file of files) {
    try {
      log(`Log-Datei wird gelesen: ${file.name}`);
      log(`Dateigröße: ${formatFileSize(file.size)}`);

      if (file.size > 30 * 1024 * 1024) {
        log('Warnung: Diese Log-Datei ist größer als 30 MB. Die Verarbeitung kann länger dauern.', 'warn');
      }

      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      const sheetName = wb.SheetNames[0];
      log(`Log-Sheet wurde erkannt: ${sheetName}`, 'ok');

      const sheet = wb.Sheets[sheetName];
      const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: true });
      log(`Log-Zeilen gelesen: ${rawRows.length}`);

      if (rawRows.length > 100000) {
        log('Warnung: Mehr als 100.000 Log-Zeilen erkannt. Die Verarbeitung kann viel Speicher benötigen.', 'warn');
      }

      const normalized = normalizeRows(rawRows, file.name);
      const missing = missingColumns(normalized.columns, REQUIRED_LOG);

      if (missing.length) {
        log(`Fehler: ${file.name} wird übersprungen. Log-Pflichtspalten fehlen: ${missing.join(', ')}`, 'error');
        continue;
      }

      const validRows = [];

      for (const row of normalized.rows) {
        const anlageDatum = normalizeDateTime(row.ANLAGE_DATUM);

        if (!anlageDatum) {
          continue;
        }

        row.ANLAGE_DATUM = anlageDatum;
        row.START_KOORDINATE = normalizeCoord(row.START_KOORDINATE);
        row.ZIEL_KOORDINATE = normalizeCoord(row.ZIEL_KOORDINATE);
        row.AUFTRAG = normalizeValue(row.AUFTRAG);
        validRows.push(row);
      }

      pushRowsSafe(state.rowsLog, validRows);

      log(`Gültige Log-Zeilen: ${validRows.length}`, 'ok');
      log(`Übersprungene Log-Zeilen: ${rawRows.length - validRows.length}`, 'ok');
    } catch (err) {
      log(`Fehler beim Lesen von ${file.name}: ${describeError(err)}`, 'error');
    }
  }

  state.logIndex = buildLogIndex(state.rowsLog);
  state.stats.filesLog = state.filesLog.length;
  state.stats.rowsLog = state.rowsLog.length;
  updateStatus();
}

function selectSheet(wb, preferred) {
  return (preferred || []).find(s => wb.SheetNames.includes(s)) || wb.SheetNames[0];
}

function normalizeRows(rows, fileName) {
  const out = [];
  const cols = new Set();

  rows.forEach((row, idx) => {
    const n = {
      Source_File: fileName,
      Source_Row: idx + 2,
      __original: SETTINGS.includeOriginalJsonInDebug ? JSON.stringify(row) : ''
    };

    Object.entries(row).forEach(([key, value]) => {
      const column = canonicalColumnName(key);
      cols.add(column);
      n[column] = value;
    });

    out.push(n);
  });

  return { rows: out, columns: cols };
}

function missingColumns(cols, required) {
  return required.filter(c => !cols.has(c));
}

function buildIndexes(rows) {
  const idx = {
    level1: new Map(),
    level2: new Map(),
    level3: new Map()
  };

  rows.forEach(row => {
    addIndex(idx.level1, keyLevel1(row), row);
    addIndex(idx.level2, keyLevel2(row), row);
    addIndex(idx.level3, keyLevel3(row), row);
  });

  log(`Index Level 1 erstellt (${idx.level1.size} Schlüssel)`, 'ok');
  log(`Index Level 2 erstellt (${idx.level2.size} Schlüssel)`, 'ok');
  log(`Index Level 3 erstellt (${idx.level3.size} Schlüssel)`, 'ok');
  return idx;
}

function addIndex(map, key, row) {
  if (!key) {
    return;
  }

  if (!map.has(key)) {
    map.set(key, []);
  }

  map.get(key).push(row);
}

function joinKey(parts) {
  return parts.map(v => normalizeValue(v)).join('|');
}

function keyLog(r) {
  return joinKey([r.ANLAGE_DATUM, r.START_KOORDINATE, r.ZIEL_KOORDINATE]);
}

function keyLogForResult(r) {
  return joinKey([normalizeDateTime(r.END_DATUM) || normalizeValue(r.END_DATUM), r.START_KOORDINATE, r.ZIEL_KOORDINATE]);
}

function buildLogIndex(rows) {
  const indexLog = new Map();

  for (const row of rows) {
    addIndex(indexLog, keyLog(row), row);
  }

  log(`Log-Index erstellt (${indexLog.size} Schlüssel)`, 'ok');
  return indexLog;
}

function emptyLogMatchFields(out) {
  out.AUFTRAG = '';
  out.NEUE_MENGE = '';
  out.ALTE_MENGE = '';
  out.PRODUKT_MENGE = '';
  out.BEMERKUNG = '';
  out.BEWEG_TYP = '';
  out.ANGELEGTDURCH = '';
  out.MHD_NEU = '';
  out.ZIEL_LHM_NR = '';
  out.Log_Match_Methode = '';
  out.Log_Match_Qualität = '';
  out.Log_Debug_Hinweis = '';
  out.Log_Source_File = '';
  out.Log_Source_Row = '';
}

function addLogFieldsFromHit(result, hit) {
  result.AUFTRAG = normalizeValue(hit.AUFTRAG);
  result.NEUE_MENGE = formatDecimalDE(hit.NEUE_MENGE, 2);
  result.ALTE_MENGE = formatDecimalDE(hit.ALTE_MENGE, 2);
  result.PRODUKT_MENGE = formatDecimalDE(hit.PRODUKT_MENGE, 2);
  result.BEMERKUNG = normalizeValue(hit.BEMERKUNG);
  result.BEWEG_TYP = normalizeValue(hit.BEWEG_TYP);
  result.ANGELEGTDURCH = normalizeValue(hit.ANGELEGTDURCH);
  result.MHD_NEU = normalizeDateTime(hit.MHD_NEU) || normalizeValue(hit.MHD_NEU);
  result.ZIEL_LHM_NR = formatExcelText(hit.ZIEL_LHM_NR);
}

function applyLogMatch(result, indexLog) {
  const hits = indexLog.get(keyLogForResult(result)) || [];

  emptyLogMatchFields(result);

  if (hits.length === 1) {
    addLogFieldsFromHit(result, hits[0]);
    result.Log_Match_Methode = 'ANLAGE_DATUM+START+ZIEL';
    result.Log_Match_Qualität = 'SICHER';
    result.Log_Source_File = hits[0].Source_File;
    result.Log_Source_Row = hits[0].Source_Row;
    return result.Log_Match_Qualität;
  }

  if (hits.length > 1) {
    result.Log_Match_Methode = 'ANLAGE_DATUM+START+ZIEL';
    result.Log_Match_Qualität = 'MEHRDEUTIG';
    result.Log_Debug_Hinweis = 'Mehrere Log-Treffer gefunden';
    return result.Log_Match_Qualität;
  }

  result.Log_Match_Qualität = 'NICHT_GEFUNDEN';
  result.Log_Debug_Hinweis = 'Kein Log-Treffer gefunden';
  return result.Log_Match_Qualität;
}

function createDirectLogResults(rowsLog) {
  const results = [];

  for (const row of rowsLog) {
    results.push({
      START_KOORDINATE: row.START_KOORDINATE,
      ZIEL_KOORDINATE: row.ZIEL_KOORDINATE,
      SL_BEREICH: normalizeValue(row.BEWEG_TYP),
      SL_TERMINAL: normalizeValue(row.BEMERKUNG),
      SL_BENUTZER: normalizeValue(row.ANGELEGTDURCH),
      BEGINN_DATUM: normalizeDateTime(row.ANLAGE_DATUM) || normalizeValue(row.ANLAGE_DATUM),
      END_DATUM: normalizeDateTime(row.ANLAGE_DATUM) || normalizeValue(row.ANLAGE_DATUM),
      ERSTER_TRANSPORT: normalizeDateTime(row.ANLAGE_DATUM) || normalizeValue(row.ANLAGE_DATUM),
      LETZTER_TRANSPORT: normalizeDateTime(row.ANLAGE_DATUM) || normalizeValue(row.ANLAGE_DATUM),
      ARBEITSSTUNDEN: formatDecimalDE(row.ARBEITSSTUNDEN, 2),
      LHM_NR: formatExcelText(row.LHM_NR),
      ARTIKEL_NR: normalizeValue(row.ARTIKEL_NR),
      AUFTRAG: normalizeValue(row.AUFTRAG),
      NEUE_MENGE: formatDecimalDE(row.NEUE_MENGE, 2),
      ALTE_MENGE: formatDecimalDE(row.ALTE_MENGE, 2),
      PRODUKT_MENGE: formatDecimalDE(row.PRODUKT_MENGE, 2),
      BEMERKUNG: normalizeValue(row.BEMERKUNG),
      BEWEG_TYP: normalizeValue(row.BEWEG_TYP),
      ANGELEGTDURCH: normalizeValue(row.ANGELEGTDURCH),
      MHD_NEU: normalizeDateTime(row.MHD_NEU) || normalizeValue(row.MHD_NEU),
      ZIEL_LHM_NR: formatExcelText(row.ZIEL_LHM_NR),
      Source_File: row.Source_File,
      Source_Row: row.Source_Row,
      Transport_ID: '',
      System_Typ: SYSTEM_TYPES.LOG,
      Match_Methode: 'LOG_DIREKT',
      Match_Qualität: 'SICHER',
      Debug_Hinweis: 'Aus Log-Datei direkt erzeugt',
      Kandidaten_Anzahl: 1,
      Matched_Source_File: '',
      Matched_Source_Row: '',
      Log_Match_Methode: 'LOG_DIREKT',
      Log_Match_Qualität: 'SICHER',
      Log_Debug_Hinweis: 'Direkter Log-Datensatz',
      Log_Source_File: row.Source_File,
      Log_Source_Row: row.Source_Row
    });
  }

  return results;
}

function keyLevel1(r) {
  return joinKey([r.BEGINN_DATUM, r.START_KOORDINATE, r.ZIEL_KOORDINATE, r.SL_TERMINAL, r.SL_BENUTZER]);
}

function keyLevel2(r) {
  return joinKey([r.BEGINN_DATUM, r.START_KOORDINATE, r.ZIEL_KOORDINATE]);
}

function keyLevel3(r) {
  return joinKey([r.BEGINN_DATUM, r.START_KOORDINATE]);
}

function findMatch(row, indexes) {
  const levels = [
    {
      c: indexes.level1.get(keyLevel1(row)) || [],
      m: 'BEGINN+START+ZIEL+TERMINAL+BENUTZER',
      q: 'SICHER'
    },
    {
      c: indexes.level2.get(keyLevel2(row)) || [],
      m: 'BEGINN+START+ZIEL',
      q: 'WAHRSCHEINLICH'
    },
    {
      c: indexes.level3.get(keyLevel3(row)) || [],
      m: 'BEGINN+START',
      q: 'UNSICHER'
    }
  ];

  for (const level of levels) {
    if (level.c.length === 1) {
      return Object.assign({}, level, { row: level.c[0], hint: '', count: 1 });
    }

    if (level.c.length > 1) {
      return Object.assign({}, level, {
        row: null,
        q: 'MEHRDEUTIG',
        hint: 'Mehrere mögliche Treffer gefunden',
        count: level.c.length
      });
    }
  }

  return {
    row: null,
    m: '',
    q: 'NICHT_GEFUNDEN',
    hint: 'Kein Treffer gefunden',
    count: 0
  };
}

function makeTransportIds(rows) {
  const counters = {};

  rows.forEach(row => {
    const d = dateOnlyKey(row.BEGINN_DATUM);
    counters[d] = (counters[d] || 0) + 1;
    row.Transport_ID = `${SYSTEM_TYPES.STAPLER}_${d}_${pad(counters[d], 6)}`;
  });
}

function analyse() {
  if (!state.rowsWithout.length || !state.rowsWith.length) {
    log('Analyse nicht möglich: Bitte beide Dateigruppen laden.', 'error');
    return;
  }

  log('Analyse gestartet');
  state.stats = Object.assign({}, state.stats, {
    analysed: 0,
    sicher: 0,
    wahrscheinlich: 0,
    unsicher: 0,
    mehrdeutig: 0,
    nichtGefunden: 0,
    logSicher: 0,
    logMehrdeutig: 0,
    logNichtGefunden: 0
  });
  state.results = [];

  const rowsToAnalyse = state.rowsWithout.filter(row => isAfterAlreadyAnalysed(row.BEGINN_DATUM));
  rowsToAnalyse.sort((a, b) => {
    return (a.BEGINN_DATUM + a.Source_File + a.Source_Row).localeCompare(b.BEGINN_DATUM + b.Source_File + b.Source_Row);
  });

  makeTransportIds(rowsToAnalyse);

  const indexes = buildIndexes(state.rowsWith);
  const results = [];

  for (const row of rowsToAnalyse) {
    const match = findMatch(row, indexes);
    const matched = match.row;
    const out = {
      Source_File: row.Source_File,
      Source_Row: row.Source_Row,
      Transport_ID: row.Transport_ID,
      System_Typ: SYSTEM_TYPES.STAPLER,
      BEGINN_DATUM: normalizeDateTime(row.BEGINN_DATUM) || normalizeValue(row.BEGINN_DATUM),
      END_DATUM: normalizeDateTime(row.END_DATUM) || normalizeValue(row.END_DATUM),
      ERSTER_TRANSPORT: normalizeDateTime(row.ERSTER_TRANSPORT) || normalizeValue(row.ERSTER_TRANSPORT),
      LETZTER_TRANSPORT: normalizeDateTime(row.LETZTER_TRANSPORT) || normalizeValue(row.LETZTER_TRANSPORT),
      ARBEITSSTUNDEN: formatDecimalDE(row.ARBEITSSTUNDEN, 2),
      START_KOORDINATE: row.START_KOORDINATE,
      ZIEL_KOORDINATE: row.ZIEL_KOORDINATE,
      SL_BEREICH: normalizeValue(row.SL_BEREICH),
      SL_TERMINAL: normalizeValue(row.SL_TERMINAL),
      SL_BENUTZER: normalizeValue(row.SL_BENUTZER),
      LHM_NR: matched ? formatExcelText(matched.LHM_NR) : '',
      ARTIKEL_NR: matched ? normalizeValue(matched.ARTIKEL_NR) : '',
      Match_Methode: match.m,
      Match_Qualität: match.q,
      Debug_Hinweis: match.hint,
      Kandidaten_Anzahl: match.count,
      Matched_Source_File: matched ? matched.Source_File : '',
      Matched_Source_Row: matched ? matched.Source_Row : ''
    };

    if (state.logIndex.size) {
      const logQuality = applyLogMatch(out, state.logIndex);

      if (logQuality === 'SICHER') {
        state.stats.logSicher++;
      } else if (logQuality === 'MEHRDEUTIG') {
        state.stats.logMehrdeutig++;
      } else {
        state.stats.logNichtGefunden++;
      }
    } else {
      emptyLogMatchFields(out);
    }

    if (SETTINGS.includeOriginalJsonInDebug) {
      out.Originalfelder = row.__original;
    }

    results.push(out);
    state.stats.analysed++;

    if (match.q === 'SICHER') {
      state.stats.sicher++;
    } else if (match.q === 'WAHRSCHEINLICH') {
      state.stats.wahrscheinlich++;
    } else if (match.q === 'UNSICHER') {
      state.stats.unsicher++;
    } else if (match.q === 'MEHRDEUTIG') {
      state.stats.mehrdeutig++;
    } else {
      state.stats.nichtGefunden++;
    }
  }

  updateStatus();
  log('Analyse abgeschlossen', 'ok');
  state.results = results;
  createZip(results).catch(err => log(`Fehler beim ZIP-Export: ${describeError(err)}`, 'error'));
}

function logKontrolleStarten() {
  if (!state.rowsLog.length) {
    log('Log-Kontrolle nicht möglich: Bitte zuerst Log-Dateien laden.', 'error');
    return;
  }

  log('Log-Kontrolle gestartet');
  state.stats.logSicher = 0;
  state.stats.logMehrdeutig = 0;
  state.stats.logNichtGefunden = 0;

  if (!state.results.length) {
    state.results = createDirectLogResults(state.rowsLog);
    state.stats.analysed = state.results.length;
    state.stats.sicher = state.results.length;
    state.stats.wahrscheinlich = 0;
    state.stats.unsicher = 0;
    state.stats.mehrdeutig = 0;
    state.stats.nichtGefunden = 0;
    state.stats.logSicher = state.results.length;
    log('Log-Kontrolle im direkten Log-Modus ausgeführt', 'ok');
    updateStatus();
    createZip(state.results).catch(err => log(`Fehler beim ZIP-Export: ${describeError(err)}`, 'error'));
    return;
  }

  for (const result of state.results) {
    const quality = applyLogMatch(result, state.logIndex);

    if (quality === 'SICHER') {
      state.stats.logSicher++;
    } else if (quality === 'MEHRDEUTIG') {
      state.stats.logMehrdeutig++;
    } else {
      state.stats.logNichtGefunden++;
    }
  }

  updateStatus();
  log('Log-Kontrolle abgeschlossen', 'ok');
  createZip(state.results).catch(err => log(`Fehler beim ZIP-Export: ${describeError(err)}`, 'error'));
}

function isoWeek(dtString) {
  const d = new Date(`${dtString.slice(0, 10)}T00:00:00`);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));

  const yearStart = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return { year: d.getFullYear(), week };
}

function weekStartDate(dtString) {
  const d = new Date(`${dtString.slice(0, 10)}T00:00:00`);
  const day = d.getDay() || 7;

  d.setDate(d.getDate() - day + 1);
  return `${d.getFullYear()}_${pad(d.getMonth() + 1)}_${pad(d.getDate())}`;
}

function groupByWeek(rows) {
  const groups = new Map();

  rows.forEach(row => {
    const dateForWeek = row.BEGINN_DATUM || row.END_DATUM;
    let key = 'OHNE_DATUM';

    if (dateForWeek) {
      const w = isoWeek(dateForWeek);
      key = `${w.year}_${weekStartDate(dateForWeek)}_KW${pad(w.week)}`;
    }

    if (!groups.has(key)) {
      groups.set(key, []);
    }

    groups.get(key).push(row);
  });

  return groups;
}

function csvEscape(v) {
  const s = v == null ? '' : String(v);
  return /[;"\r\n]/.test(s) ? `"${s.replaceAll('"', '""')}"` : s;
}

function toCsv(rows, cols) {
  const lines = ['\ufeff' + cols.join(';')];

  for (const row of rows) {
    lines.push(cols.map(col => csvEscape(row[col])).join(';'));
  }

  return lines.join('\r\n');
}

async function createZip(results) {
  const zip = new JSZip();
  const groups = groupByWeek(results);

  for (const [week, rows] of groups.entries()) {
    zip.file(`${SETTINGS.outputPrefix}_${week}.csv`, toCsv(rows, OUTPUT_COLUMNS));
  }

  const debugRows = results.filter(row => {
    return row.Match_Qualität === 'MEHRDEUTIG' || row.Match_Qualität === 'NICHT_GEFUNDEN';
  });
  const debugColumns = SETTINGS.includeOriginalJsonInDebug ? DEBUG_COLUMNS.concat(['Originalfelder']) : DEBUG_COLUMNS;

  zip.file(`${SETTINGS.debugPrefix}.csv`, toCsv(debugRows, debugColumns));

  const blob = await zip.generateAsync({ type: 'blob' });
  downloadBlob(blob, `stapler_normalisierung_${zipTimestamp()}.zip`);
  log('ZIP wurde erzeugt', 'ok');
}

function zipTimestamp() {
  const d = new Date();
  return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}

function downloadBlob(blob, name) {
  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();

  setTimeout(() => {
    URL.revokeObjectURL(a.href);
    a.remove();
  }, 1000);
}

document.getElementById('btnOhne').addEventListener('click', () => document.getElementById('inputOhne').click());
document.getElementById('btnMit').addEventListener('click', () => document.getElementById('inputMit').click());
document.getElementById('btnAnalyse').addEventListener('click', analyse);
document.getElementById('btnLog').addEventListener('click', () => document.getElementById('inputLog').click());
document.getElementById('btnLogKontrolle').addEventListener('click', logKontrolleStarten);
document.getElementById('inputOhne').addEventListener('change', event => {
  state.filesWithout = Array.from(event.target.files);
  readSelectedFiles(state.filesWithout, 'without');
});
document.getElementById('inputMit').addEventListener('change', event => {
  state.filesWith = Array.from(event.target.files);
  readSelectedFiles(state.filesWith, 'with');
});
document.getElementById('inputLog').addEventListener('change', event => {
  state.filesLog = Array.from(event.target.files);
  readLogFiles(state.filesLog);
});
updateStatus();
log(window.APP_SETTINGS ? 'setting.js geladen.' : 'setting.js nicht gefunden oder leer: Default-Werte werden verwendet.', 'warn');
